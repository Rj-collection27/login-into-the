
<!doctype html>
<html>
      <head><title> login page </title>
	  <style> 
	  
	 body {
             display: flex;

		 align-items:center;

}

	  <body>

<form onsubmit="return showdetails()">
	  
	  <h3>student login </h3>

	  <label> USERNAME :</label>
	  <input placeholder="enetr your username" type="text" id="user" required></input><br><br>

	  <label> EMAIL ID :</label>
	  <input placeholder="enter your email" type="email" id="email" required></input><br><br>

	  <label> PHONE NO: </label>
	  <input placeholder="enter your phone no" type="number" id="phone" required></input><br><br>
	  
 	  <label> PASSWORD :</label>
	  <input placeholder="enter your password" type="password" id="pass" required></input><br><br>
	 
	  <button id="b1" type="submit"> submit </button>
	  
	 </form> 
	  
	<script>
function showdetails(){
     var user=document.getElementById('user').value;
     var email=document.getElementById('email').value;
     var phone=document.getElementById('phone').value;
     var pass=document.getElementById('pass').value;

if (user === "" || email === "" || phone === "" || pass === "" ){
  alert(" please fill all details ");
  return false;
  }
else {
  alert("login successfull");
  window.location.href="second.html";
  return false;
  }
}
</script>
